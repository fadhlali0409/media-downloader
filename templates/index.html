<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Downloader</title>

<link rel="stylesheet" href="/static/css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="container">

<div class="logo">
🚀 Media Downloader
</div>

<h1>
Download Video & Audio
</h1>

<p class="subtitle">
Download from TikTok, YouTube, Instagram, Facebook, X and more...
</p>

<div class="search-box">

<input
type="text"
placeholder="Paste your link here..."
>

<button>
Download
</button>

</div>
<div class="platforms">

<div class="platform">🎥 YouTube</div>

<div class="platform">🎵 TikTok</div>

<div class="platform">📸 Instagram</div>

<div class="platform">✖ X</div>

<div class="platform">📘 Facebook</div>

<div class="platform">🎧 MP3</div>

</div>

<div class="result-card">

<img
src="https://placehold.co/600x340"
alt="Preview"
>

<h2>Video Title</h2>

<p>Select download format</p>

<div class="buttons">

<button class="video-btn">
🎬 Download Video
</button>

<button class="audio-btn">
🎵 Download Audio
</button>

</div>

</div>
</div>

<footer>

<p>© 2026 Media Downloader</p>

<p>Fast • Secure • Free</p>

</footer>

</div>

<script src="/static/js/script.js"></script>

</body>
</html>
