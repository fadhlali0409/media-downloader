<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRT Journal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <header>
    <h1>📊 CRT Journal</h1>
    <p>تسجيل ومتابعة صفقات CRT</p>
  </header>

  <div class="card">

    <label>الزوج</label>
    <select id="pair">
      <option>EURUSD</option>
      <option>GBPUSD</option>
      <option>USDJPY</option>
      <option>XAUUSD</option>
    </select>

    <label>نوع الصفقة</label>
    <select id="type">
      <option>Buy</option>
      <option>Sell</option>
    </select>

    <label>الدخول</label>
    <input type="number" id="entry" placeholder="سعر الدخول">

    <label>الهدف</label>
    <input type="number" id="tp" placeholder="Take Profit">

    <label>وقف الخسارة</label>
    <input type="number" id="sl" placeholder="Stop Loss">

    <button onclick="addTrade()">➕ إضافة صفقة</button>

  </div>

  <div class="card">
    <h3>📌 الصفقات</h3>
    <div id="trades"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
